<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Webshop Backend — Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --ok:#2d7a4f; --warn:#b58a2c; --err:#8d1d2c; --bg:#faf7f2; --card:#fff; --text:#1f1612; --muted:#8a7f76; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 24px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .card { background: var(--card); border: 1px solid #e8e0d8; border-radius: 12px; padding: 16px; }
  .card h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 8px; }
  .big { font-size: 26px; font-weight: 700; }
  .big.ok { color: var(--ok); } .big.warn { color: var(--warn); } .big.err { color: var(--err); }
  .kv { font-size: 12.5px; padding: 3px 0; display: flex; justify-content: space-between; gap: 12px; }
  .kv b { font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #f0e9e1; }
  th { color: var(--muted); font-weight: 600; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .pill.inserted { background: #e7f3ec; color: var(--ok); }
  .pill.updated { background: #eef1f6; color: #3a5a8c; }
  .pill.deactivated { background: #fdf3e3; color: var(--warn); }
  .pill.error { background: #fbeaec; color: var(--err); }
  .empty { color: var(--muted); font-style: italic; font-size: 12.5px; }
  footer { color: var(--muted); font-size: 11.5px; margin-top: 16px; }
</style>
</head>
<body>
<h1>Webshop Backend</h1>
<div class="sub">Sync général DB → webshop DB · rafraîchi toutes les 5 s</div>

<div class="grid">
  <div class="card"><h2>API</h2><div id="api" class="big">…</div></div>
  <div class="card"><h2>Outbox en attente</h2><div id="outbox" class="big">…</div></div>
  <div class="card"><h2>Erreurs (24 h)</h2><div id="errcount" class="big">…</div></div>
  <div class="card"><h2>Horodatage</h2><div id="state"></div></div>
</div>

<div class="card" style="margin-bottom:12px">
  <h2>Activité sync — dernières 24 h</h2>
  <div id="activity"><span class="empty">chargement…</span></div>
</div>

<div class="card">
  <h2>Erreurs récentes</h2>
  <div id="errors"><span class="empty">chargement…</span></div>
</div>

<footer>GET /sync/status · GET /health — voir backend/README.md</footer>

<script>
const fmt = (iso) => iso ? new Date(iso).toLocaleString('fr-BE') : '—';

async function refresh() {
  const apiEl = document.getElementById('api');
  try {
    const h = await fetch('/health').then((r) => r.json());
    apiEl.textContent = h.ok ? 'EN LIGNE' : 'DÉGRADÉ';
    apiEl.className = 'big ' + (h.ok ? 'ok' : 'warn');
  } catch {
    apiEl.textContent = 'HORS LIGNE'; apiEl.className = 'big err';
    return;
  }

  const s = await fetch('/sync/status').then((r) => r.json());

  const ob = document.getElementById('outbox');
  ob.textContent = s.outbox_pending === null ? 'n/a' : s.outbox_pending;
  ob.className = 'big ' + (s.outbox_pending > 50 ? 'err' : s.outbox_pending > 0 ? 'warn' : 'ok');

  const ec = document.getElementById('errcount');
  ec.textContent = s.recent_errors.length;
  ec.className = 'big ' + (s.recent_errors.length ? 'err' : 'ok');

  document.getElementById('state').innerHTML = [
    ['Dernier événement', s.state.last_event_sync],
    ['Dernier full sync', s.state.last_full_sync],
    ['Dernier reconcile', s.state.last_reconcile],
    ['Worker démarré', s.state.worker_started],
  ].map(([k, v]) => `<div class="kv"><span>${k}</span><b>${fmt(v)}</b></div>`).join('');

  document.getElementById('activity').innerHTML = s.last_24h.length
    ? '<table><tr><th>Entité</th><th>Action</th><th>Nombre</th></tr>' +
      s.last_24h.map((r) => `<tr><td>${r.entity}</td><td><span class="pill ${r.action}">${r.action}</span></td><td>${r.n}</td></tr>`).join('') + '</table>'
    : '<span class="empty">aucune activité sur 24 h</span>';

  document.getElementById('errors').innerHTML = s.recent_errors.length
    ? '<table><tr><th>Quand</th><th>Entité</th><th>Réf</th><th>Détail</th></tr>' +
      s.recent_errors.map((e) => `<tr><td>${fmt(e.created_at)}</td><td>${e.entity}</td><td>${e.external_id || '—'}</td><td>${e.detail || ''}</td></tr>`).join('') + '</table>'
    : '<span class="empty">aucune erreur sur 24 h ✓</span>';
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
