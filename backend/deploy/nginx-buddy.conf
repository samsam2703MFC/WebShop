# Reverse-proxy HTTPS devant le buddy-server (Node, :3002).
# GitHub Pages est en HTTPS → le backend DOIT l'être aussi (sinon "mixed content").
#
# Installation :
#   1) Remplace api.atelierby.online par TON domaine (crée un A record → IP du serveur).
#   2) sudo cp nginx-buddy.conf /etc/nginx/sites-available/buddy
#      sudo ln -s /etc/nginx/sites-available/buddy /etc/nginx/sites-enabled/
#   3) sudo apt install certbot python3-certbot-nginx
#      sudo certbot --nginx -d api.atelierby.online   # génère + insère le certificat, auto-renouvelé
#   4) sudo nginx -t && sudo systemctl reload nginx

# HTTP → redirige vers HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.atelierby.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.atelierby.online;

    # Certbot remplit ces deux lignes automatiquement (Let's Encrypt) :
    ssl_certificate     /etc/letsencrypt/live/api.atelierby.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.atelierby.online/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Le CORS est géré par le buddy-server lui-même — ne pas le dupliquer ici.
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # Webhook Stripe : corps brut requis pour la vérification de signature.
    # Le buffering nginx par défaut convient (le body arrive entier au Node).
    client_max_body_size 2m;
}
