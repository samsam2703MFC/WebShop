name: Deploy to server (SSH / rsync)

# Builds the PWA and pushes BOTH the frontend and the PHP API to the client's
# server over SSH (rsync). Same origin: frontend at the web root, API at /api →
# no CORS, and api-config.js auto-detects the API at /api.
#
# ─── One-time setup (GitHub → Settings → Secrets and variables → Actions) ─────
#   Secrets:
#     SSH_HOST       server IP/host, e.g. 185.180.206.46
#     SSH_USER       ssh user (e.g. a dedicated deploy user — see note below)
#     SSH_PASSWORD   that user's password
#   Variables:
#     DEPLOY_ENABLED set to  true   to turn this workflow on (dormant otherwise)
#   Optional variables (per-project isolation):
#     SSH_PORT       ssh port (default 22)
#     WEB_ROOT       this project's DocumentRoot (default /var/www/html)
#                    e.g. /var/www/atelierby/public  — frontend lands here, API at <WEB_ROOT>/api
#     SITE_BASE      base path the site is served at (default /). Use / for a
#                    domain/subdomain/port root; use /atelierby/ only if served on a subpath.
#
#   Notes:
#   • config.php is gitignored → it is NEVER uploaded, so the server's real
#     config.php (with DB credentials) is preserved across every deploy.
#   • rsync runs WITHOUT --delete, so nothing on the server is wiped — EXCEPT a
#     targeted --delete on the migrations/ folder only (no secrets there), so
#     retired migrations can't linger and wedge migrate.sh.
#   • SECURITY: prefer a dedicated non-root deploy user + SSH key over the root
#     password. To switch to a key, replace the sshpass lines with an ssh-agent
#     key and drop SSH_PASSWORD.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # Dormant until you set the repository variable DEPLOY_ENABLED = true.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build frontend (served from web root)
        env:
          SITE_BASE: ${{ vars.SITE_BASE || '/' }}
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Prepare remote directories (validates SSH login)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -p ${{ vars.SSH_PORT || '22' }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ vars.WEB_ROOT || '/var/www/html' }}/api' && command -v rsync >/dev/null || (echo 'rsync manquant sur le serveur — apt-get install -y rsync'; exit 1)"

      - name: Deploy PHP API → ${{ vars.WEB_ROOT || '/var/www/html' }}/api
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e rsync -rltDz --omit-dir-times \
            -e "ssh -p ${{ vars.SSH_PORT || '22' }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            php-api/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.WEB_ROOT || '/var/www/html' }}/api/"

      # Purge les migrations OBSOLÈTES côté serveur : le rsync principal n'utilise
      # pas --delete (pour préserver config.php à la racine de l'API), donc un
      # fichier de migration retiré du repo restait sur le serveur et pouvait
      # bloquer migrate.sh (fail-fast) — c'est ce qui est arrivé avec
      # 0008_shops_unify_phase1.sql. Ce rsync ciblé --delete sur le SEUL dossier
      # migrations/ (aucun secret n'y vit) fait du repo la source de vérité.
      - name: Prune stale server-side migrations (repo = source of truth)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e rsync -rltDz --omit-dir-times --delete \
            -e "ssh -p ${{ vars.SSH_PORT || '22' }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            php-api/migrations/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.WEB_ROOT || '/var/www/html' }}/api/migrations/"

      # Applique les migrations SQL non encore jouées (idempotent, versionné).
      # migrate.sh vient d'être rsyncé avec l'API ; il lit config.php pour les creds.
      - name: Run DB migrations (idempotent, tracked)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -p ${{ vars.SSH_PORT || '22' }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "bash '${{ vars.WEB_ROOT || '/var/www/html' }}/api/migrate.sh'"

      - name: Deploy frontend → ${{ vars.WEB_ROOT || '/var/www/html' }}
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e rsync -rltDz --omit-dir-times \
            -e "ssh -p ${{ vars.SSH_PORT || '22' }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            dist/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.WEB_ROOT || '/var/www/html' }}/"

      # Renseigne ws_products.img d'après les photos déposées sous assets/product_pictures/
      # (idempotent, non destructif). À FAIRE APRÈS le déploiement du front (les photos
      # arrivent avec dist/). Toute nouvelle photo {id}.png|jpg est ainsi câblée à son
      # produit sans SQL manuel, pour tous les consommateurs (webshop, PWA).
      - name: Sync product photos → ws_products.img (idempotent)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -p ${{ vars.SSH_PORT || '22' }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "php '${{ vars.WEB_ROOT || '/var/www/html' }}/api/sync_product_images.php'"

      # Le site /landing (alias Apache → /var/www/latelierby-landing) est déployé
      # EXCLUSIVEMENT par le dépôt `landing` (git reset --hard origin/main côté
      # serveur). Ce workflow n'y touche plus : le dossier landing/ et ses étapes
      # de déploiement ont été rapatriés là-bas pour supprimer les écrasements
      # croisés entre les deux pipelines (ex. livraison-bureau.html).
