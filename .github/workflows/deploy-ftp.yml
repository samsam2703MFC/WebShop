name: Deploy to hosting (FTP)

# Pushes the built frontend AND the PHP API to the client's shared hosting over
# FTPS on every push to main. Same origin (frontend at web root, API at /api) →
# no CORS, nothing to configure in the frontend.
#
# ─── One-time setup (Settings → Secrets and variables → Actions) ─────────────
#   Secrets:
#     FTP_SERVER      the FTP host, e.g. ftp.atelierby.online
#     FTP_USERNAME    the FTP account user
#     FTP_PASSWORD    the FTP account password
#   Variables:
#     FTP_ENABLED     set to  true   to turn this workflow on (stays dormant otherwise)
#   Optional variables (sensible defaults shown):
#     FTP_WEB_DIR     server dir for the frontend   (default ./            = web root)
#     FTP_API_DIR     server dir for the PHP API     (default ./api/       )
#     FTP_WEB_BASE    base path the site is served at (default /  ; use /sub/ for a subfolder)
#
#   config.php on the server is NEVER overwritten or deleted (it is excluded below),
#   so your DB credentials / secrets stay safe across deploys.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ftp-deploy:
    # Dormant until you set the repository variable FTP_ENABLED = true.
    if: ${{ vars.FTP_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build frontend (root base)
        env:
          SITE_BASE: ${{ vars.FTP_WEB_BASE || '/' }}
        run: npm run build

      - name: Upload frontend → web root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ vars.FTP_WEB_DIR || './' }}
          # Never let the frontend sync touch the API folder living under the web root.
          exclude: |
            **/api/**

      - name: Upload PHP API → /api
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./php-api/
          server-dir: ${{ vars.FTP_API_DIR || './api/' }}
          # Keep the server's real config.php (secrets) — never overwrite or delete it.
          exclude: |
            **/config.php
            **/.git*
            **/*.md
